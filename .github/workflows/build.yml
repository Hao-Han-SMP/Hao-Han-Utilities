name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: |
          chmod +x gradlew
          ./gradlew clean test shadowJar

      - name: Collect deployable JAR
        run: |
          mkdir -p artifacts
          find build/libs -maxdepth 1 -type f -name '*.jar' \
            ! -name '*-plain.jar' \
            ! -name '*-sources.jar' \
            -exec cp '{}' artifacts/ \;

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: HaoHanUtilities
          path: artifacts/*.jar
          if-no-files-found: error

