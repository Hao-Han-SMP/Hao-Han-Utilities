name: HaoHanUtilities
version: '${version}'
main: vn.haohansmp.utilities.HaoHanUtilitiesPlugin
api-version: '1.21.11'
author: Hao Han SMP
description: Carry functional blocks safely and remove Phantom spawns from every world.

softdepend:
  - WorldGuard
  - GriefPrevention
  - BlockLocker
  - BetterTeams

commands:
  haohanutilities:
    description: Hảo Hán Utilities administration command
    usage: /haohanutilities <info|reload|status|inspect|recover>
    aliases: [hhu, carryblocks, carryblock, cb]

permissions:
  haohanutilities.carry.use:
    description: Cho phép bưng và đặt block
    default: true
  haohanutilities.admin:
    description: Quản trị Hảo Hán Utilities
    default: op
  haohanutilities.bypass.protection:
    description: Bỏ qua protection probe khi bưng hoặc đặt block
    default: op
