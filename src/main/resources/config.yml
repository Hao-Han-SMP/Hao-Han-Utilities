pickup:
  maximum-distance: 4.5

placement:
  maximum-distance: 5.0
  require-solid-support: true

carrying:
  # Tốc độ khi mang vật thường hoặc container rỗng.
  movement-speed-multiplier: 0.75
  # Container càng đầy thì tốc độ càng tiến gần mức này.
  full-container-movement-speed-multiplier: 0.35
  disable-gliding: true
  disable-flight: false
  disable-combat: true

recovery:
  restore-on-startup: true

protection:
  enabled: true

entities:
  enabled: true

animation:
  object-scale: 1.05
  forward-offset: 0.72
  vertical-offset: -0.55
  entity-forward-offset: 0.95
  entity-vertical-offset: -1.15

phantom-suppression:
  enabled: true
  remove-existing: true

worlds:
  mode: BLACKLIST
  list:
    - world_the_end

blocks:
  allowed:
    - CHEST
    - TRAPPED_CHEST
    - BARREL
    - FURNACE
    - BLAST_FURNACE
    - SMOKER
    - HOPPER
    - DISPENSER
    - DROPPER
    - BREWING_STAND
    - CRAFTER
    - SHULKER_BOX
    - WHITE_SHULKER_BOX
    - ORANGE_SHULKER_BOX
    - MAGENTA_SHULKER_BOX
    - LIGHT_BLUE_SHULKER_BOX
    - YELLOW_SHULKER_BOX
    - LIME_SHULKER_BOX
    - PINK_SHULKER_BOX
    - GRAY_SHULKER_BOX
    - LIGHT_GRAY_SHULKER_BOX
    - CYAN_SHULKER_BOX
    - PURPLE_SHULKER_BOX
    - BLUE_SHULKER_BOX
    - BROWN_SHULKER_BOX
    - GREEN_SHULKER_BOX
    - RED_SHULKER_BOX
    - BLACK_SHULKER_BOX
    - CHISELED_BOOKSHELF
    - DECORATED_POT
    - JUKEBOX
    - BEEHIVE
    - BEE_NEST
    - CRAFTING_TABLE
    - SMITHING_TABLE
    - STONECUTTER
    - CARTOGRAPHY_TABLE
    - LOOM
    - GRINDSTONE
    - ENCHANTING_TABLE
